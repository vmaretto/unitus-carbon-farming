<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Direct Admin Access</title>
</head>
<body>
    <h1>Auto-login in corso...</h1>
    
    <script>
        // FORCE LOGIN WITHOUT ANY FORM
        async function directLogin() {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: 'PostiBlockchain$01' })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    document.body.innerHTML = '<h1>✅ Token salvato! Reindirizzamento...</h1>';
                    
                    // FORCE REDIRECT
                    window.location.replace('/admin/');
                } else {
                    document.body.innerHTML = '<h1>❌ Errore: ' + (data.error || 'Unknown') + '</h1>';
                }
            } catch (error) {
                document.body.innerHTML = '<h1>❌ Errore di rete: ' + error.message + '</h1>';
            }
        }
        
        // RUN IMMEDIATELY
        directLogin();
    </script>
</body>
</html>
