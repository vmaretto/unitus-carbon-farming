<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Carbon Farming Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green-900:#1b3a2d; --green-700:#245a3d; --green-500:#2c7a4b; --green-100:#ecf6f0; --orange-500:#ff7a1a; --gray-900:#1c1c1c; --gray-700:#3d3d3d; --gray-500:#6b6b6b; --gray-200:#d9d9d9; --gray-100:#f3f4f6; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
        header { background: linear-gradient(135deg, rgba(27,58,45,0.94), rgba(44,122,75,0.88)); color: white; padding: 22px 24px; box-shadow: 0 10px 40px rgba(27,58,45,0.25); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
        header h1 { font-size: 1.55rem; margin: 0; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 22px; align-items: center; flex-wrap: nowrap; }
        .nav-links a { color: white; text-decoration: none; padding: 0 0 6px; font-weight: 600; font-size: 0.95rem; transition: color 0.2s ease; position: relative; white-space: nowrap; }
        .nav-links a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 2px; background: var(--orange-500); transition: width 0.2s ease; }
        .nav-links a:hover, .nav-links a.active { color: #ffd7c1; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        main { max-width: 900px; margin: 24px auto; padding: 0 24px 40px; }
        .card { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 8px 30px rgba(31,41,55,0.08); border: 1px solid rgba(36,90,61,0.08); margin-bottom: 24px; }
        .card h2 { font-size: 1.3rem; margin: 0 0 16px; color: var(--green-900); }
        .card h3 { font-size: 1.1rem; margin: 0 0 8px; }
        .welcome { font-size: 1.1rem; margin: 0 0 4px; opacity: 0.9; }
        .progress-bar { background: var(--gray-200); border-radius: 999px; height: 8px; overflow: hidden; margin-top: 8px; }
        .progress-fill { background: linear-gradient(90deg, var(--green-500), #4ade80); height: 100%; border-radius: 999px; transition: width 0.5s ease; }
        .course-card { border: 1px solid var(--gray-200); border-radius: 14px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .course-card:hover { border-color: var(--green-500); box-shadow: 0 4px 16px rgba(44,122,75,0.15); background: linear-gradient(90deg, white, #f0fdf4); }
        .course-card::after { content: '→'; font-size: 1.5rem; color: var(--green-500); opacity: 0.5; transition: all 0.2s; }
        .course-card:hover::after { opacity: 1; transform: translateX(4px); }
        .course-card-content { flex: 1; }
        .course-meta { color: var(--gray-500); font-size: 0.85rem; margin-top: 4px; }
        .live-banner { background: linear-gradient(120deg, var(--green-700), var(--green-500)); color: white; border-radius: 14px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .live-banner h3 { margin: 0; color: white; }
        .live-banner p { margin: 4px 0 0; opacity: 0.9; font-size: 0.9rem; }
        .live-banner a { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 999px; text-decoration: none; font-weight: 600; }
        .zoom-btn { display: inline-block; padding: 10px 20px; border-radius: 999px; font-weight: 600; text-align: center; }
        .zoom-btn.active { background: rgba(255,255,255,0.2); color: white; text-decoration: none; cursor: pointer; }
        .zoom-btn.active:hover { background: rgba(255,255,255,0.35); }
        .zoom-btn.disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); cursor: not-allowed; }
        .empty { color: var(--gray-500); text-align: center; padding: 32px; }
        .course-goal { margin-top: 8px; font-size: 0.85rem; font-weight: 600; color: var(--green-700); }
        .course-goal.reached { color: var(--green-500); }
        .upcoming-lessons { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .upcoming-lesson-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(36,90,61,0.12);
            box-shadow: 0 6px 20px rgba(31,41,55,0.06);
        }
        .upcoming-lesson-date {
            font-size: 2.2rem;
            line-height: 1;
            font-weight: 700;
            color: var(--green-500);
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .upcoming-lesson-date small {
            display: block;
            margin-top: 6px;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--green-700);
        }
        .upcoming-lesson-title { font-size: 1rem; font-weight: 600; color: var(--green-900); line-height: 1.4; }
        .upcoming-lesson-meta { margin-top: 8px; font-size: 0.85rem; color: var(--gray-500); }
        .upcoming-lesson-placeholder {
            grid-column: 1 / -1;
            background: var(--gray-100);
            border: 1px dashed var(--gray-200);
            color: var(--gray-500);
            text-align: center;
        }
        @media (max-width: 980px) {
            .header-content { flex-direction: column; align-items: flex-start; }
            .nav-links { width: 100%; gap: 16px; flex-wrap: wrap; }
        }
        @media (max-width: 720px) {
            .upcoming-lessons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>Carbon Farming Master</h1>
                <p class="welcome" id="welcome-msg">Ciao!</p>
            </div>
            <div class="nav-links">
                <a href="/learn/index.html" class="active">Dashboard</a>
                <a href="/learn/calendar.html">Calendario</a>
                <a href="/learn/resources.html">Risorse</a>
                <a href="/learn/checkin.html">Check-in</a>
                <a href="/learn/documents.html">Documenti</a>
                <a href="/learn/questions.html">Domande</a>
                <a href="/learn/surveys.html">Questionari</a>
                <a href="#" id="logout-btn">Esci</a>
            </div>
        </div>
    </header>

    <main>
        <!-- Banner questionari da compilare -->
        <div id="surveys-banner" style="display:none;"></div>

        <!-- AI Study Companion: piano di studio personalizzato giornaliero -->
        <study-companion-widget></study-companion-widget>

        <!-- Prossima lezione live -->
        <div id="live-section"></div>

        <!-- Corsi iscritti -->
        <div class="card">
            <h2>I miei percorsi</h2>
            <div id="courses-list">
                <div class="empty">Caricamento...</div>
            </div>
        </div>
    </main>

    <script src="/learn/js/guest-guard.js"></script>
    <script src="/learn/js/dashboard-utils.js"></script>
    <script src="/learn/js/prof-carbonio-chat.js" defer></script>
    <script src="/learn/js/study-companion.js" defer></script>
    <script>
        // Auth check
        function getToken() {
            // Check hash fragment (from magic link redirect)
            const hash = window.location.hash;
            if (hash.startsWith('#token=')) {
                const t = hash.slice(7);
                try {
                    localStorage.setItem('learnToken', t);
                    // Parse user info from JWT
                    const payload = JSON.parse(atob(t.split('.')[1]));
                    if (payload.firstName || payload.lastName) {
                        localStorage.setItem('learnUser', JSON.stringify(payload));
                    }
                    // Clean URL without reload
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                } catch (e) {
                    console.error('Token parse error:', e);
                }
                return t;
            }
            return localStorage.getItem('learnToken');
        }

        const token = getToken();
        console.log('Token loaded:', token ? 'yes (' + token.substring(0,20) + '...)' : 'no');
        if (!token) { window.location.href = '/learn/login.html'; }

        let userInfo = {};
        try { userInfo = JSON.parse(localStorage.getItem('learnUser') || '{}'); } catch(e) {}

        function getSelectedCourseId() {
            return localStorage.getItem('learnSelectedCourseId') || userInfo.selectedCourseId || userInfo.currentMasterId || '';
        }

        function toLocalDateKey(dateInput) {
            const date = new Date(dateInput);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderWelcome(user, courses = []) {
            const selectedMasterName = DashboardUtils.resolveSelectedMasterName(user, courses, getSelectedCourseId());
            document.getElementById('welcome-msg').textContent = DashboardUtils.formatDashboardGreeting(user, selectedMasterName);
        }

        renderWelcome(userInfo);

        document.getElementById('logout-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('learnToken');
            localStorage.removeItem('learnUser');
            window.location.href = '/learn/login.html';
        });

        async function api(url) {
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) {
                localStorage.removeItem('learnToken');
                window.location.href = '/learn/login.html';
                return null;
            }
            if (!res.ok) throw new Error('API error');
            return res.json();
        }

        async function refreshCurrentUser() {
            try {
                const profile = await api('/api/students/me');
                if (profile) {
                    userInfo = profile;
                    localStorage.setItem('learnUser', JSON.stringify(profile));
                    renderWelcome(profile);
                }
            } catch (error) {
                console.error('Error refreshing student profile', error);
            }
        }

        function formatUpcomingLessonDate(startDatetime) {
            const start = new Date(startDatetime);
            return {
                day: start.toLocaleDateString('it-IT', { day: '2-digit' }),
                month: start.toLocaleDateString('it-IT', { month: 'short' }).replace('.', ''),
                label: start.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' })
            };
        }

        function renderUpcomingLessons(lessons) {
            const liveSection = document.getElementById('live-section');
            if (!Array.isArray(lessons) || !lessons.length) {
                liveSection.innerHTML = `
                    <div class="card">
                        <h2>Prossime lezioni</h2>
                        <div class="upcoming-lessons">
                            <div class="upcoming-lesson-card upcoming-lesson-placeholder">Nessuna lezione in programma</div>
                        </div>
                    </div>
                `;
                return;
            }

            liveSection.innerHTML = `
                <div class="card">
                    <h2>Prossime lezioni</h2>
                    <div class="upcoming-lessons">
                        ${lessons.map((lesson) => {
                            const dateParts = formatUpcomingLessonDate(lesson.startDatetime);
                            const startTime = new Date(lesson.startDatetime).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                            return `
                                <article class="upcoming-lesson-card">
                                    <div class="upcoming-lesson-date">
                                        ${dateParts.day}
                                        <small>${dateParts.month}</small>
                                    </div>
                                    <div class="upcoming-lesson-title">${dateParts.label} — ${lesson.title || 'Lezione'}</div>
                                    <div class="upcoming-lesson-meta">${startTime}${lesson.locationPhysical ? ' · ' + lesson.locationPhysical : ''}</div>
                                </article>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        async function loadUpcomingLessons() {
            const params = new URLSearchParams({ limit: '2' });
            const selectedCourseId = getSelectedCourseId();
            if (selectedCourseId) params.set('courseId', selectedCourseId);
            const lessons = await api('/api/lms/my-upcoming-lessons?' + params.toString());
            renderUpcomingLessons(lessons || []);
        }

        async function loadDashboard() {
            const stored = localStorage.getItem('learnUser');
            const user = stored ? JSON.parse(stored) : {};
            const isGuest = user.role === 'guest';

            if (isGuest) {
                await renderGuestDashboard(user);
                return;
            }

            try {
                const courses = await api('/api/lms/my-courses');
                if (!courses) return;
                renderWelcome(userInfo, courses);

                const coursesList = document.getElementById('courses-list');
                if (!courses.length) {
                    coursesList.innerHTML = '<div class="empty">Non sei iscritto a nessun corso.</div>';
                    return;
                }

                coursesList.innerHTML = '';
                courses.forEach(c => {
                    const totalHours = parseFloat(c.totalPlannedHours) || 432;
                    const attendedHours = parseFloat(c.attendedHours) || 0;
                    const pct = totalHours > 0 ? Math.round((attendedHours / totalHours) * 100) : 0;
                    const attendedHoursText = attendedHours.toFixed(1).replace('.0', '');
                    const totalHoursText = totalHours.toFixed(1).replace('.0', '');
                    const goalMessage = DashboardUtils.formatAttendanceGoalMessage(c);
                    const goalData = DashboardUtils.getAttendanceGoalData(c);

                    const div = document.createElement('div');
                    div.className = 'course-card';
                    div.innerHTML = `
                        <div class="course-card-content">
                            <h3>${c.title}</h3>
                            <div class="course-meta">${c.editionName} &bull; ${attendedHoursText} ore su ${totalHoursText} frequentate (${pct}%)</div>
                            <div class="course-goal ${goalData.missingHours <= 0 ? 'reached' : ''}">${goalMessage}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        window.location.href = `/learn/course.html?id=${c.id}`;
                    });
                    coursesList.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading dashboard', error);
            }

            // Carica lezioni di oggi e prossime
            try {
                const lessonsRes = await fetch('/api/lessons');
                if (lessonsRes.ok) {
                    const lessons = await lessonsRes.json();
                    const now = new Date();
                    const todayStr = toLocalDateKey(now);
                    
                    // Filtra lezioni di oggi e future, ordinate per orario
                    const relevantLessons = lessons
                        .filter(l => {
                            const lessonDate = new Date(l.startDatetime);
                            const lessonDateStr = toLocalDateKey(lessonDate);
                            const endTime = new Date(lessonDate.getTime() + (l.durationMinutes || 120) * 60000);
                            return l.status !== 'cancelled' && (lessonDateStr >= todayStr || endTime > now);
                        })
                        .sort((a, b) => new Date(a.startDatetime) - new Date(b.startDatetime));

                    const liveSection = document.getElementById('live-section');
                    
                    // Prendi le lezioni di oggi
                    const todaysLessons = relevantLessons.filter(l => {
                        const lessonDateStr = toLocalDateKey(l.startDatetime);
                        return lessonDateStr === todayStr;
                    });
                    
                    if (todaysLessons.length > 0) {
                        let bannersHtml = '';
                        
                        todaysLessons.forEach((lesson, index) => {
                            const startTime = new Date(lesson.startDatetime);
                            const endTime = new Date(startTime.getTime() + (lesson.durationMinutes || 120) * 60000);
                            const thirtyMinBefore = new Date(startTime.getTime() - 30 * 60000);
                            const dt = startTime.toLocaleString('it-IT', { hour: '2-digit', minute: '2-digit' });
                            const endDt = endTime.toLocaleString('it-IT', { hour: '2-digit', minute: '2-digit' });
                            
                            // Controlla se c'è una lezione precedente ancora in corso
                            let previousInProgress = false;
                            if (index > 0) {
                                const prevLesson = todaysLessons[index - 1];
                                const prevStart = new Date(prevLesson.startDatetime);
                                const prevEnd = new Date(prevStart.getTime() + (prevLesson.durationMinutes || 120) * 60000);
                                if (now < prevEnd && now >= thirtyMinBefore) {
                                    previousInProgress = true;
                                }
                            }
                            
                            // Stato del link Zoom
                            const zoomActive = lesson.locationRemote && now >= thirtyMinBefore && now <= endTime;
                            let zoomHtml = '';
                            
                            if (lesson.locationRemote) {
                                if (zoomActive) {
                                    const warningMsg = previousInProgress 
                                        ? `<br><small style="color: #fbbf24;">⚠️ Lezione precedente ancora in corso</small>` 
                                        : '';
                                    zoomHtml = `<div style="text-align: right;"><a href="${lesson.locationRemote}" target="_blank" rel="noopener" class="zoom-btn active">Collegati</a>${warningMsg}</div>`;
                                } else if (now < thirtyMinBefore) {
                                    const activeTime = thirtyMinBefore.toLocaleString('it-IT', { hour: '2-digit', minute: '2-digit' });
                                    zoomHtml = `<div style="text-align: right;"><span class="zoom-btn disabled">Collegati</span><br><small style="opacity:0.6;">Attivo dalle ${activeTime}</small></div>`;
                                }
                            }
                            
                            // Stato della lezione
                            let statusBadge = '';
                            if (now >= startTime && now <= endTime) {
                                statusBadge = '<span style="background: #22c55e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px;">IN CORSO</span>';
                            } else if (now > endTime) {
                                statusBadge = '<span style="background: rgba(255,255,255,0.3); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px;">CONCLUSA</span>';
                            }
                            
                            bannersHtml += `
                                <div class="live-banner" style="margin-bottom: 8px;">
                                    <div>
                                        <h3>${lesson.title}${statusBadge}</h3>
                                        <p>${dt} - ${endDt}${lesson.locationPhysical ? ' &bull; ' + lesson.locationPhysical : ''}</p>
                                    </div>
                                    ${zoomHtml}
                                </div>
                            `;
                        });
                        
                        liveSection.innerHTML = `<h4 style="margin: 0 0 12px; color: var(--green-700);">Lezioni di oggi</h4>${bannersHtml}`;
                    } else {
                        await loadUpcomingLessons();
                    }
                } else {
                    await loadUpcomingLessons();
                }
            } catch (e) { console.error(e); }
        }

        async function renderGuestDashboard(user) {
            let courses = [];
            try {
                courses = await api('/api/lms/my-courses');
            } catch (error) {
                console.error('Error loading guest courses', error);
            }

            const courseCards = Array.isArray(courses) && courses.length
                ? courses.map((course) => {
                    const totalHours = parseFloat(course.totalPlannedHours) || 0;
                    const totalHoursText = totalHours.toFixed(1).replace('.0', '');
                    return `
                        <article class="course-card" data-course-id="${course.id}">
                            <div class="course-card-content">
                                <h3>${course.title}</h3>
                                <div class="course-meta">${course.editionName || 'Edizione'} • ${course.totalLessons || 0} lezioni • ${totalHoursText} ore</div>
                                <div class="course-goal">Vista consultazione docente</div>
                            </div>
                        </article>
                    `;
                }).join('')
                : '<div class="empty">Nessun percorso disponibile in consultazione.</div>';

            document.querySelector('main').innerHTML = `
                <div class="card">
                    <h2>Corsi disponibili</h2>
                    <div class="course-list">
                        ${courseCards}
                    </div>
                    <div style="margin-top:16px; text-align:center;">
                        <a href="/learn/resources.html" style="display:inline-flex; align-items:center; gap:8px; padding:12px 18px; border-radius:999px; background:var(--green-100); color:var(--green-900); text-decoration:none; font-weight:600;">
                            📚 Risorse e altri materiali
                        </a>
                    </div>
                </div>
            `;

            document.querySelectorAll('[data-course-id]').forEach((card) => {
                card.addEventListener('click', () => {
                    window.location.href = `/learn/course.html?id=${card.dataset.courseId}`;
                });
            });
        }

        async function loadPendingSurveys() {
            if (window.__isGuest) return;
            try {
                const items = await api('/api/lms/my-surveys');
                if (!items) return;
                const pending = items.filter(it => !it.completedAt);
                const banner = document.getElementById('surveys-banner');
                if (!pending.length) { banner.style.display = 'none'; return; }
                banner.style.display = 'block';
                banner.innerHTML = `
                    <a href="/learn/surveys.html" style="display:block; padding:18px 24px; background: linear-gradient(135deg,#ff7a1a,#fbbc42); color:white; border-radius:14px; text-decoration:none; margin-bottom:16px; box-shadow: 0 8px 30px rgba(255,122,26,0.25);">
                        <strong style="font-size:1.1rem;">📋 Hai ${pending.length} questionario/i da compilare</strong>
                        <div style="font-size:0.9rem; opacity:0.92; margin-top:4px;">Clicca per dare il tuo feedback →</div>
                    </a>
                `;
            } catch (e) {
                console.error('Error loading pending surveys', e);
            }
        }

        refreshCurrentUser().then(loadDashboard).then(loadPendingSurveys);
    </script>
</body>
</html>
