<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risorse - Carbon Farming Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green-900:#1b3a2d; --green-700:#245a3d; --green-500:#2c7a4b; --green-100:#ecf6f0; --orange-500:#ff7a1a; --gray-900:#1c1c1c; --gray-700:#3d3d3d; --gray-500:#6b6b6b; --gray-200:#d9d9d9; --gray-100:#f3f4f6; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
        header { background: linear-gradient(135deg, rgba(27,58,45,0.94), rgba(44,122,75,0.88)); color: white; padding: 22px 24px; box-shadow: 0 10px 40px rgba(27,58,45,0.25); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
        header h1 { font-size: 1.55rem; margin: 0; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 22px; align-items: center; flex-wrap: nowrap; }
        .nav-links a { color: white; text-decoration: none; padding: 0 0 6px; font-weight: 600; font-size: 0.95rem; transition: color 0.2s ease; position: relative; white-space: nowrap; }
        .nav-links a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 2px; background: var(--orange-500); transition: width 0.2s ease; }
        .nav-links a:hover, .nav-links a.active { color: #ffd7c1; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        main { max-width: 900px; margin: 24px auto; padding: 0 24px 40px; }
        .card { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 8px 30px rgba(31,41,55,0.08); border: 1px solid rgba(36,90,61,0.08); margin-bottom: 24px; }
        .card h2 { font-size: 1.3rem; margin: 0 0 16px; color: var(--green-900); display: flex; align-items: center; gap: 10px; }
        .card h2 .icon { font-size: 1.5rem; }
        .resource-list { display: flex; flex-direction: column; gap: 12px; }
        .resource-item { display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--gray-200); border-radius: 12px; transition: border-color 0.2s, box-shadow 0.2s; text-decoration: none; color: inherit; }
        .resource-item:hover { border-color: var(--green-500); box-shadow: 0 4px 16px rgba(44,122,75,0.1); }
        .resource-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
        .resource-icon.video { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .resource-icon.pdf { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .resource-icon.document { background: linear-gradient(135deg, #667eea, #764ba2); }
        .resource-icon.audio { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .resource-icon.link { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .resource-info { flex: 1; }
        .resource-title { font-weight: 600; color: var(--gray-900); margin: 0 0 4px; }
        .resource-desc { font-size: 0.85rem; color: var(--gray-500); margin: 0; }
        .resource-arrow { color: var(--gray-500); font-size: 1.2rem; }
        .empty { color: var(--gray-500); text-align: center; padding: 32px; }
        .loading { text-align: center; padding: 40px; color: var(--gray-500); }
        @media (max-width: 640px) { 
            .header-content { flex-direction: column; align-items: flex-start; }
            .resource-item { flex-direction: column; text-align: center; }
            .resource-arrow { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>Carbon Farming Master</h1>
                <p style="font-size: 1.1rem; margin: 0 0 4px; opacity: 0.9;">Risorse</p>
            </div>
            <div class="nav-links">
                <a href="/learn/index.html">Dashboard</a>
                <a href="/learn/calendar.html">Calendario</a>
                <a href="/learn/resources.html" class="active">Risorse</a>
                <a href="/learn/checkin.html">Check-in</a>
                <a href="/learn/documents.html">Documenti</a>
                <a href="/learn/questions.html">Domande</a>
                <a href="#" id="logout-btn">Esci</a>
            </div>
        </div>
    </header>

    <main>
        <!-- Video -->
        <div class="card">
            <h2><span class="icon">🎬</span> Video</h2>
            <div class="resource-list" id="video-list">
                <div class="loading">Caricamento...</div>
            </div>
        </div>

        <!-- Documenti generali -->
        <div class="card">
            <h2><span class="icon">📄</span> Documenti</h2>
            <div class="resource-list" id="doc-list">
                <div class="loading">Caricamento...</div>
            </div>
        </div>

        <!-- Quiz -->
        <div class="card" id="quiz-section" style="display: none;">
            <h2><span class="icon">📝</span> Quiz</h2>
            <div class="resource-list" id="quiz-list">
                <div class="loading">Caricamento...</div>
            </div>
        </div>
    </main>

    <script>
        // Auth check
        const token = localStorage.getItem('learnToken');
        if (!token) { window.location.href = '/learn/login.html'; }

        document.getElementById('logout-btn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('learnToken');
            localStorage.removeItem('learnUser');
            window.location.href = '/learn/login.html';
        });

        const typeIcons = { video: '▶️', pdf: '📑', document: '📝', audio: '🎧', link: '🔗', quiz: '📝' };

        function renderResource(item) {
            // Quiz: link alla pagina quiz invece del URL diretto
            if (item.resourceType === 'quiz') {
                return `
                    <a href="/learn/quiz.html?resourceId=${item.id}" class="resource-item">
                        <div class="resource-icon quiz" style="background: linear-gradient(135deg, #8b5cf6, #6366f1);">📝</div>
                        <div class="resource-info">
                            <p class="resource-title">${item.title}</p>
                            ${item.description ? `<p class="resource-desc">${item.description}</p>` : ''}
                        </div>
                        <span class="resource-arrow" style="background: #8b5cf6; color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem;">Fai il quiz →</span>
                    </a>
                `;
            }
            // Check if it's a PDF - open in protected viewer
            const isPdf = item.resourceType === 'pdf' || (item.url && item.url.toLowerCase().endsWith('.pdf'));
            const href = isPdf 
                ? `/learn/viewer.html?url=${encodeURIComponent(item.url)}&title=${encodeURIComponent(item.title)}&return=${encodeURIComponent(window.location.href)}`
                : item.url;
            const target = isPdf ? '' : 'target="_blank" rel="noopener"';
            
            const meta = (item.teacherName || item.lessonTitle)
                ? `<p class="resource-meta" style="color:#6b7280;font-size:12px;margin-top:4px;">${item.teacherName ? `👨‍🏫 ${item.teacherName}` : ''}${item.lessonTitle ? ` · 📅 ${item.lessonTitle}` : ''}</p>`
                : '';
            return `
                <a href="${href}" ${target} class="resource-item">
                    <div class="resource-icon ${item.resourceType}">${typeIcons[item.resourceType] || '📎'}</div>
                    <div class="resource-info">
                        <p class="resource-title">${item.title}</p>
                        ${item.description ? `<p class="resource-desc">${item.description}</p>` : ''}
                        ${meta}
                    </div>
                    <span class="resource-arrow">${isPdf ? '🔒' : '→'}</span>
                </a>
            `;
        }

        async function loadResources() {
            try {
                const res = await fetch('/api/resources?published=true');
                const allResources = await res.json();

                const videos = allResources.filter(r => r.resourceType === 'video');
                const allDocs = allResources.filter(r => ['pdf', 'document', 'audio', 'link'].includes(r.resourceType));
                const generalDocs = allDocs.filter(r => !r.teacherId && !r.lessonId);
                const quizzes = allResources.filter(r => r.resourceType === 'quiz');

                const videoList = document.getElementById('video-list');
                const docList = document.getElementById('doc-list');

                if (videos.length > 0) {
                    videoList.innerHTML = videos.map(renderResource).join('');
                } else {
                    videoList.innerHTML = '<div class="empty">Nessun video disponibile</div>';
                }

                if (generalDocs.length > 0) {
                    docList.innerHTML = generalDocs.map(renderResource).join('');
                } else {
                    docList.innerHTML = '<div class="empty">Nessun documento disponibile</div>';
                }

                // Quiz section
                const quizSection = document.getElementById('quiz-section');
                const quizList = document.getElementById('quiz-list');
                if (quizzes.length > 0) {
                    quizSection.style.display = 'block';
                    quizList.innerHTML = quizzes.map(renderResource).join('');
                }
            } catch (error) {
                console.error('Error loading resources:', error);
                document.getElementById('video-list').innerHTML = '<div class="empty">Errore nel caricamento</div>';
                document.getElementById('doc-list').innerHTML = '<div class="empty">Errore nel caricamento</div>';
            }
        }

        loadResources();
    </script>
</body>
</html>
