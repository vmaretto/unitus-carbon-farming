<!DOCTYPE html>
<html>
<head>
    <title>PDF Test</title>
</head>
<body>
    <h1>Test PDF.js</h1>
    <div id="status">Caricamento...</div>
    <canvas id="pdf-canvas"></canvas>
    
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        
        const url = 'https://tc0ghxf0np2o2zbw.public.blob.vercel-storage.com/Prova_small.pdf';
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        async function loadPDF() {
            try {
                status.textContent = 'Caricamento PDF...';
                console.log('Loading PDF:', url);
                
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                
                console.log('PDF loaded, pages:', pdf.numPages);
                status.textContent = `PDF caricato! Pagine: ${pdf.numPages}`;
                
                // Render first page
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                status.textContent = 'PDF renderizzato con successo!';
                
            } catch (error) {
                console.error('Errore:', error);
                status.textContent = `Errore: ${error.message}`;
                status.style.color = 'red';
            }
        }
        
        loadPDF();
    </script>
</body>
</html>
