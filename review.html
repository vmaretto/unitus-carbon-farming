<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisione contenuto - Carbon Farming Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green-900:#1b3a2d; --green-700:#245a3d; --green-500:#2c7a4b; --green-100:#ecf6f0; --orange-500:#ff7a1a; --gray-900:#1c1c1c; --gray-700:#3d3d3d; --gray-500:#6b6b6b; --gray-200:#d9d9d9; --gray-100:#f3f4f6; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
        header { background: linear-gradient(135deg, rgba(27,58,45,0.9), rgba(44,122,75,0.85)); color: white; padding: 24px; text-align: center; }
        header h1 { font-size: 1.4rem; margin: 0; }
        header p { margin: 4px 0 0; opacity: 0.8; font-size: 0.9rem; }
        main { max-width: 800px; margin: 32px auto; padding: 0 24px 40px; }
        .card { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 8px 30px rgba(31,41,55,0.08); border: 1px solid rgba(36,90,61,0.08); margin-bottom: 24px; }
        .card h2 { font-size: 1.3rem; margin: 0 0 8px; color: var(--green-900); }
        .card h3 { font-size: 1.05rem; margin: 0 0 12px; color: var(--green-700); }
        .meta { color: var(--gray-500); font-size: 0.9rem; margin-bottom: 20px; }

        .transcript-box {
            background: var(--gray-100); border-radius: 12px; padding: 24px;
            font-size: 0.95rem; line-height: 1.8; color: var(--gray-700);
            max-height: 500px; overflow-y: auto; white-space: pre-wrap;
            border: 1px solid var(--gray-200);
        }

        .video-box { border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; }
        .video-box video { width: 100%; display: block; }

        .actions { display: flex; gap: 12px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 14px 28px; border-radius: 12px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-approve { background: linear-gradient(135deg, var(--green-700), var(--green-500)); color: white; }
        .btn-approve:hover:not(:disabled) { opacity: 0.9; }
        .btn-reject { background: white; color: #991b1b; border: 2px solid #ef4444; }
        .btn-reject:hover:not(:disabled) { background: #fef2f2; }

        .notes-area { margin-top: 16px; display: none; }
        .notes-area textarea {
            width: 100%; padding: 14px; border: 1px solid var(--gray-200); border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; resize: vertical; min-height: 100px;
        }
        .notes-area .btn { margin-top: 12px; }

        .result { padding: 20px; border-radius: 14px; text-align: center; font-weight: 600; font-size: 1.1rem; }
        .result.success { background: #f0fdf4; border: 1px solid #22c55e; color: #166534; }
        .result.error { background: #fef2f2; border: 1px solid #ef4444; color: #991b1b; }

        .loading { text-align: center; padding: 60px; color: var(--gray-500); }
        .error-page { text-align: center; padding: 60px; }
        .error-page h2 { color: #991b1b; }

        @media (max-width: 640px) {
            main { padding: 0 16px 40px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Carbon Farming Master</h1>
        <p>Revisione contenuto didattico</p>
    </header>

    <main>
        <div id="loading" class="loading">Caricamento...</div>
        <div id="error-page" class="error-page" style="display: none;">
            <h2>Link non valido o scaduto</h2>
            <p>Il link di revisione potrebbe essere scaduto. Contatta l'amministratore per ricevere un nuovo link.</p>
        </div>
        <div id="content" style="display: none;">
            <div class="card">
                <h2 id="lesson-title"></h2>
                <div class="meta" id="review-meta"></div>

                <!-- Transcript review -->
                <div id="transcript-section" style="display: none;">
                    <h3>Trascrizione da revisionare</h3>
                    <div class="transcript-box" id="transcript-text"></div>
                </div>

                <!-- Video review -->
                <div id="video-section" style="display: none;">
                    <h3>Video da revisionare</h3>
                    <div class="video-box">
                        <video id="review-video" controls playsinline></video>
                    </div>
                </div>

                <div class="actions" id="action-buttons">
                    <button class="btn btn-approve" id="approve-btn">Approva</button>
                    <button class="btn btn-reject" id="reject-btn">Richiedi modifiche</button>
                </div>

                <div class="notes-area" id="notes-area">
                    <textarea id="notes-text" placeholder="Descrivi le modifiche richieste..."></textarea>
                    <div style="text-align: center;">
                        <button class="btn btn-reject" id="send-notes-btn">Invia richiesta modifiche</button>
                    </div>
                </div>

                <div id="result-area" style="display: none;"></div>
            </div>
        </div>
    </main>

    <script>
    (function() {
        'use strict';

        const params = new URLSearchParams(window.location.search);
        const reviewToken = params.get('token');

        if (!reviewToken) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-page').style.display = '';
            return;
        }

        let workflowData = null;

        async function loadReview() {
            try {
                const res = await fetch(`/api/workflow/review/${reviewToken}`);
                if (!res.ok) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error-page').style.display = '';
                    return;
                }

                workflowData = await res.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = '';

                document.getElementById('lesson-title').textContent = workflowData.lessonTitle || 'Contenuto da revisionare';

                const metaParts = [];
                if (workflowData.moduleTitle) metaParts.push(workflowData.moduleTitle);
                if (workflowData.stage === 'teacher_review_transcript') metaParts.push('Revisione trascrizione');
                if (workflowData.stage === 'teacher_review_video') metaParts.push('Revisione video avatar');
                document.getElementById('review-meta').textContent = metaParts.join(' — ');

                // Show transcript or video based on stage
                if (workflowData.stage === 'teacher_review_transcript' && workflowData.transcriptText) {
                    document.getElementById('transcript-section').style.display = '';
                    document.getElementById('transcript-text').textContent = workflowData.transcriptText;
                }

                if (workflowData.stage === 'teacher_review_video' && workflowData.avatarVideoUrl) {
                    document.getElementById('video-section').style.display = '';
                    document.getElementById('review-video').src = workflowData.avatarVideoUrl;
                }

                // Show reviewer notes if present
                if (workflowData.reviewerNotes) {
                    const notesDiv = document.createElement('div');
                    notesDiv.style.cssText = 'background: #fef3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 0.9rem;';
                    notesDiv.innerHTML = '<strong>Note precedenti:</strong> ' + escapeHtml(workflowData.reviewerNotes);
                    document.getElementById('transcript-section').parentNode.insertBefore(notesDiv, document.getElementById('action-buttons'));
                }

            } catch (error) {
                console.error('Error loading review', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-page').style.display = '';
            }
        }

        // Approve
        document.getElementById('approve-btn').addEventListener('click', async () => {
            if (!workflowData) return;
            const approveBtn = document.getElementById('approve-btn');
            approveBtn.disabled = true;

            const endpoint = workflowData.stage === 'teacher_review_transcript'
                ? `/api/workflow/${workflowData.id}/approve-transcript`
                : `/api/workflow/${workflowData.id}/approve-video`;

            try {
                const res = await fetch(endpoint, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reviewToken })
                });

                const resultArea = document.getElementById('result-area');
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('notes-area').style.display = 'none';
                resultArea.style.display = '';

                if (res.ok) {
                    resultArea.innerHTML = '<div class="result success">Contenuto approvato! Grazie per la revisione.</div>';
                } else {
                    const data = await res.json();
                    resultArea.innerHTML = `<div class="result error">${data.error || 'Errore nell\'approvazione'}</div>`;
                    approveBtn.disabled = false;
                    document.getElementById('action-buttons').style.display = '';
                }
            } catch (error) {
                approveBtn.disabled = false;
            }
        });

        // Reject — show notes area
        document.getElementById('reject-btn').addEventListener('click', () => {
            document.getElementById('notes-area').style.display = '';
            document.getElementById('notes-text').focus();
        });

        // Send rejection with notes
        document.getElementById('send-notes-btn').addEventListener('click', async () => {
            if (!workflowData) return;
            const notes = document.getElementById('notes-text').value.trim();
            if (!notes) { alert('Inserisci una descrizione delle modifiche richieste.'); return; }

            const sendBtn = document.getElementById('send-notes-btn');
            sendBtn.disabled = true;

            try {
                const res = await fetch(`/api/workflow/${workflowData.id}/request-changes`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reviewToken, notes })
                });

                const resultArea = document.getElementById('result-area');
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('notes-area').style.display = 'none';
                resultArea.style.display = '';

                if (res.ok) {
                    resultArea.innerHTML = '<div class="result success">Richiesta di modifiche inviata. Grazie per il feedback.</div>';
                } else {
                    const data = await res.json();
                    resultArea.innerHTML = `<div class="result error">${data.error || 'Errore nell\'invio'}</div>`;
                    sendBtn.disabled = false;
                    document.getElementById('action-buttons').style.display = '';
                    document.getElementById('notes-area').style.display = '';
                }
            } catch (error) {
                sendBtn.disabled = false;
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadReview();
    })();
    </script>
</body>
</html>
